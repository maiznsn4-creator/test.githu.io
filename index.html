<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ចុះឈ្មោះប្រឡងប្រវត្តិវិទ្យា ទី១២</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #e3edf7;
            --text-color: #31344b;
            --main-accent: #3498db;
            --shadow-raised: 6px 6px 12px #b8c7d9, -6px -6px 12px #ffffff;
            --shadow-pressed: inset 4px 4px 8px #b8c7d9, inset -4px -4px 8px #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            position: relative;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 35px 25px;
            background: var(--bg-color);
            border-radius: 30px;
            box-shadow: var(--shadow-raised);
            text-align: center;
            margin-bottom: 40px;
        }

        .icon-box {
            font-size: 55px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        h1 { font-size: 22px; margin-bottom: 8px; color: #2c3e50; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 25px; }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            padding-left: 5px;
            color: #2c3e50;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: none;
            outline: none;
            background: var(--bg-color);
            box-shadow: var(--shadow-pressed);
            border-radius: 15px;
            font-size: 15px;
            color: var(--text-color);
            transition: 0.3s;
        }

        /* រចនាបថកន្លែងជ្រើសរើសថ្នាក់ (Radio Cards) */
        .class-selector {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .class-option {
            flex: 1;
            position: relative;
        }

        .class-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .class-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 15px;
            background: var(--bg-color);
            border-radius: 15px;
            box-shadow: var(--shadow-raised);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            font-weight: 600;
            font-size: 14px;
        }

        .class-card i {
            font-size: 24px;
            color: #7f8c8d;
            transition: 0.3s;
        }

        /* នៅពេលដេលគេចុចរើស (Checked) */
        .class-option input[type="radio"]:checked + .class-card {
            box-shadow: var(--shadow-pressed);
            color: var(--main-accent);
            border-color: rgba(52, 152, 219, 0.3);
        }

        .class-option input[type="radio"]:checked + .class-card i {
            color: var(--main-accent);
            transform: scale(1.1);
        }

        /* ប៊ូតុងបញ្ជូនទិន្នន័យ */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--bg-color);
            box-shadow: var(--shadow-raised);
            border: none;
            border-radius: 15px;
            color: #2c3e50;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            margin-top: 25px;
        }

        .submit-btn:active {
            box-shadow: var(--shadow-pressed);
            transform: scale(0.98);
        }

        /* រក្សាសិទ្ធិដោយ ខ្លឹមសារ */
        footer {
            position: absolute;
            bottom: 15px;
            font-size: 12px;
            opacity: 0.7;
        }

        /* ផ្ទាំងលោតព្រមានបែបស្អាត (Custom Alert Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: var(--bg-color);
            padding: 30px 20px;
            border-radius: 25px;
            max-width: 90%;
            width: 360px;
            text-align: center;
            box-shadow: var(--shadow-raised);
            transform: scale(0.8);
            transition: 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 45px;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .modal-box h3 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .modal-box p {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .modal-close-btn {
            padding: 10px 25px;
            background: var(--bg-color);
            box-shadow: var(--shadow-raised);
            border: none;
            border-radius: 12px;
            color: #e74c3c;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close-btn:active {
            box-shadow: var(--shadow-pressed);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">
        <i class="fas fa-graduation-cap"></i>
    </div>
    <h1>ប្រឡងតេស្តប្រវត្តិវិទ្យា ថ្នាក់ទី១២</h1>
    <p>សូមបំពេញព័ត៌មានខាងក្រោមដើម្បីចូលរួមធ្វើតេស្ត</p>
    
    <form id="regForm" onsubmit="return validateForm(event)">
        <div class="form-group">
            <label><i class="fas fa-user"></i> ឈ្មោះសិស្ស</label>
            <input type="text" id="username" class="input-field" placeholder="វាយបញ្ចូលឈ្មោះរបស់អ្នក...">
        </div>

        <div class="form-group">
            <label><i class="fas fa-school"></i> មកពីសាលារៀន/វិទ្យាល័យ</label>
            <input type="text" id="school" class="input-field" placeholder="វាយបញ្ចូលឈ្មោះសាលារៀន...">
        </div>

        <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> មកពីខេត្ត/ក្រុង</label>
            <input type="text" id="province" class="input-field" placeholder="វាយបញ្ចូលឈ្មោះខេត្ត/ក្រុង...">
        </div>

        <div class="form-group">
            <label><i class="fas fa-book"></i> ជ្រើសរើសផ្នែក/ថ្នាក់សិក្សា</label>
            <div class="class-selector">
                
                <label class="class-option">
                    <input type="radio" name="class_type" value="science" checked>
                    <div class="class-card">
                        <i class="fas fa-atom"></i>
                        <span>វិទ្យាសាស្ត្រ</span>
                    </div>
                </label>

                <label class="class-option">
                    <input type="radio" name="class_type" value="social">
                    <div class="class-card">
                        <i class="fas fa-globe-asia"></i>
                        <span>ថ្នាក់សង្គម</span>
                    </div>
                </label>

            </div>
        </div>

        <button type="submit" class="submit-btn">
            ចុះឈ្មោះចូលរួម <i class="fas fa-arrow-right"></i>
        </button>
    </form>
</div>

<div class="modal-overlay" id="alertModal">
    <div class="modal-box">
        <div class="modal-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <h3>សូមបំពេញព័ត៌មាន!</h3>
        <p id="alertMessage">សូមបំពេញព័ត៌មានដែលខ្វះខាតឱ្យបានគ្រប់ជ្រុងជ្រោយ។</p>
        <button class="modal-close-btn" onclick="closeModal()">យល់ព្រម</button>
    </div>
</div>

<footer>
    <p>រក្សាសិទ្ធិដោយ ខ្លឹមសារ</p>
</footer>

<script>
    function validateForm(event) {
        // ទប់កុំឱ្យវាផ្លាស់ទីទៅទំព័រផ្សេងភ្លាមៗ
        event.preventDefault(); 

        const username = document.getElementById('username').value.trim();
        const school = document.getElementById('school').value.trim();
        const province = document.getElementById('province').value.trim();
        
        const modal = document.getElementById('alertModal');
        const alertMessage = document.getElementById('alertMessage');

        // ឆែកមើលថាមានប្រអប់ណាទំនេរអត់
        if (username === "") {
            alertMessage.innerText = "សូមមេត្តាបំពេញ «ឈ្មោះសិស្ស» របស់អ្នក!";
            modal.classList.add('active');
            return false;
        }
        if (school === "") {
            alertMessage.innerText = "សូមមេត្តាបំពេញឈ្មោះ «សាលារៀន/វិទ្យាល័យ»!";
            modal.classList.add('active');
            return false;
        }
        if (province === "") {
            alertMessage.innerText = "សូមមេត្តាបំពេញ «ខេត្ត/ក្រុង» ដែលអ្នករស់នៅ!";
            modal.classList.add('active');
            return false;
        }

        // បើបំពេញគ្រប់ហើយ វានឹងរុញទៅកាន់ទំព័រ acc.html រួមជាមួយទិន្នន័យ
        const classType = document.querySelector('input[name="class_type"]:checked').value;
        window.location.href = `acc.html?username=${encodeURIComponent(username)}&school=${encodeURIComponent(school)}&province=${encodeURIComponent(province)}&class_type=${classType}`;
    }

    function closeModal() {
        document.getElementById('alertModal').classList.remove('active');
    }
</script>

</body>
</html>
